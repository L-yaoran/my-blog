{% extends "base.html" %}
{% block title %}{{ post.meta.title }} — 我的博客{% endblock %}

{% block content %}
<article class="post-full">
    <header class="post-header">
        <h1 class="post-title">{{ post.meta.title }}</h1>
        <time class="post-date">{{ post.meta.date }}</time>
    </header>
    <div class="post-body">
        {{ post.html|safe }}
    </div>
    <a href="/" class="back-link">&larr; 返回首页</a>
</article>
{% endblock %}
