<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{TITLE}}</title>
<link rel="stylesheet" href="/static/js/codemirror/codemirror.min.css?v=20260602">
<link rel="stylesheet" href="/static/js/codemirror/theme/eclipse.min.css?v=20260602">
<link rel="stylesheet" href="/static/css/quiz.css?v=20260602">
</head>
<body>

<div class="container">
  <div class="header">
    <div class="badge">交互式练习</div>
    <h1>{{TITLE}}</h1>
    <div class="subtitle">{{SUBTITLE}} · 即时反馈 · 记录保存</div>
  </div>
  <div class="quiz-nav">
    {{PREV_LINK}}
    <div class="quiz-dropdown">
      <button class="quiz-dropdown-btn" onclick="toggleDropdown(this)">{{DROPDOWN_LABEL}} <span class="arrow-icon">▾</span></button>
      <div class="quiz-dropdown-menu">
{{NAV_DROPDOWN}}
      </div>
    </div>
    {{NEXT_LINK}}
  </div>
  <div class="sticky-toolbar">
    <a href="/" class="back-link">&larr; 返回主页</a>
    <div class="score-bar">
      <div class="score-item"><div class="score-label">客观题</div><div class="score-num"><span id="objDone">0</span>/{{OBJ_TOTAL}}</div></div>
      <div class="score-item"><div class="score-label">主观题</div><div class="score-num"><span id="subjDone">0</span>/{{SUBJ_TOTAL}}</div></div>
      <div class="score-item" id="scoreResult" style="display:none"><div class="score-label">得分</div><div class="score-num"><span id="correctCount">0</span></div></div>
      <div style="flex:1;min-width:0;"></div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:0.35rem;position:relative;">
        <div style="display:flex;gap:0.5rem;">
          <button type="button" class="score-btn" id="btnSubmit" onclick="submitAll()">提交答案</button>
          <button type="button" class="score-btn" style="background:var(--muted)" onclick="resetAll()">重置进度</button>
        </div>
      </div>
    </div>
    <div style="width:100%;display:flex;align-items:center;justify-content:space-between;padding-top:0.35rem;border-top:1px dashed var(--border);position:relative;">
      <span onclick="toggleHistory()" style="cursor:pointer;font-size:0.78rem;color:var(--sub);user-select:none;">做题记录 <span id="historyToggleIcon">▼</span></span>
      <div style="display:flex;gap:0.5rem;">
        <button type="button" class="score-btn" style="background:var(--green)" onclick="saveProgress()">暂存进度</button>
        <button type="button" class="score-btn" style="background:var(--purple)" onclick="loadProgress()">加载进度</button>
        <button type="button" class="score-btn" style="background:var(--gold)" onclick="exportProgress()">导出数据</button>
        <button type="button" class="score-btn" style="background:var(--blue)" onclick="importProgress()">导入数据</button>
        <input type="file" id="importFileInput" accept=".json" style="display:none" onchange="handleImportFile(event)">
      </div>
      <div class="history-panel" id="historyPanel">
    <h4>做题记录 <button class="history-clear" onclick="clearHistory()">清空记录</button></h4>
    <ul class="history-list" id="historyList"></ul>
    <div class="history-empty" id="historyEmpty">暂无记录</div>
  </div>
    </div>
  </div>

  <div class="history-detail-overlay" id="historyDetailOverlay" onclick="closeHistoryDetail()">
    <div class="history-detail" id="historyDetail" onclick="event.stopPropagation()">
      <div class="history-detail-header">
        <h4>答题详情</h4>
        <button class="history-detail-close" onclick="closeHistoryDetail()">&times;</button>
      </div>
      <div class="history-detail-body" id="historyDetailBody"></div>
    </div>
  </div>

{{SECTION_1}}

{{SECTION_2}}

{{SECTION_3}}

{{SECTION_4}}

</div>

<div class="toast" id="toast"></div>

<script>
const STORAGE_KEY = '{{STORAGE_KEY}}';
const SAVE_KEY = '{{SAVE_KEY}}';
</script>
<script src="/static/js/codemirror/codemirror.min.js?v=20260602"></script>
<script src="/static/js/codemirror/mode/python/python.min.js?v=20260602"></script>
<script src="/static/js/quiz-engine.js?v=20260602"></script>

</body>
</html>
